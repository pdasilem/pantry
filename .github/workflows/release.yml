name: Release

on:
  push:
    tags:
      - '*' # Trigger on any tag push

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o dist/uniam-darwin-arm64 ./cmd/uniam
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o dist/uniam-darwin-amd64 ./cmd/uniam
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/uniam-linux-amd64 ./cmd/uniam
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/uniam-linux-arm64 ./cmd/uniam
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/uniam-windows-amd64.exe ./cmd/uniam
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          name: Release ${{ github.ref_name }}
          body: |
            Initial stable release of Uniam.
            Features:
                MCP server for persisting project-level notes
                Built-in Semantic Search
                Support for Gemini, OpenAI, Anthropic, and Local embeddings
                Agent hooks for: claude-code, cursor, windsurf, antigravity, codex, opencode, copilot, gemini
                Installation of fast context MCP plugins (code-search, mcp-ripgrep)
          draft: false
          prerelease: false
